<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jenkins Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 100px;
        }
        h1 {
            font-size: 3em;
        }
        p {
            font-size: 1.5em;
        }
        .btn {
            padding: 10px 20px;
            background: white;
            color: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Jenkins CI/CD Success</h1>
        <p>This page is deployed using Jenkins + GitHub + EC2</p>
        <button class="btn" onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Deployment working perfectly!");
        }
    </script>
</body>
</html>
